name: Documentation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build

      # Optional: Lint Markdown files, requires mdl (`mdl` gem)
      - name: Lint Markdown
        run: |
          gem install mdl
          mdl docs/ || true  # Remove "|| true" if you want lint errors to fail the build
